<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinBD - Forgot Password</title>

    <link rel="stylesheet" href="css/style.css">

    <style>
        body{
            margin:0;
            font-family:Poppins,sans-serif;
            background:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .card{
            width:95%;
            max-width:450px;
            background:#1e293b;
            border-radius:15px;
            padding:30px;
            color:#fff;
        }

        h2{
            text-align:center;
            margin-bottom:10px;
        }

        p{
            text-align:center;
            color:#bdbdbd;
            margin-bottom:25px;
        }

        label{
            display:block;
            margin-bottom:8px;
        }

        input,select,textarea{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:none;
            border-radius:8px;
            background:#334155;
            color:#fff;
            box-sizing:border-box;
        }

        textarea{
            resize:vertical;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
            margin-top:10px;
        }

        .submit{
            background:#facc15;
            color:#000;
        }

        .support{
            background:#2563eb;
            color:#fff;
        }

        .back{
            display:block;
            text-align:center;
            margin-top:20px;
            color:#facc15;
            text-decoration:none;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>Forgot Password</h2>

    <p>Need help? Submit your request below.</p>

    <form>

        <label>Username / Email / Phone</label>

        <input
            type="text"
            placeholder="Enter Username, Email or Phone"
            required>

        <label>Problem Type</label>

        <select required>

            <option value="">Select Problem</option>

            <option>Password Forgotten</option>

            <option>OTP Not Received</option>

            <option>Account Locked</option>

            <option>Unable to Login</option>

            <option>Other</option>

        </select>

        <label>Describe Your Problem</label>

        <textarea
            rows="5"
            placeholder="Write your problem..."
            required></textarea>

        <label>Screenshot (Optional)</label>

        <input type="file">

        <button class="submit">
            Submit Request
        </button>

    </form>

    <button class="support">
        💬 Live Support
    </button>

    <a href="login.html" class="back">
        ← Back to Login
    </a>

</div>

</body>
</html>
